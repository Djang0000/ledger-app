    // 7. Recent 8 transactions
    renderTxnList(document.getElementById('home-txn-list'), txns.slice(0, 8), {
      onEdit: (id) => App.showEditTxnModal(id),
      onDelete: (id) => App.deleteTxnWithConfirm(id),
      emptyMsg: '还没有交易记录\n点击底部 + 开始记账吧',
    });

    // Bind budget empty click
    const budgetEmpty = document.getElementById('home-budget-empty');
    if (budgetEmpty) {
      budgetEmpty.addEventListener('click', () => { App.navigateTo('settings'); setTimeout(() => App.showBudgetModal(), 300); });
    }
  },

  /* ---- 6b: Transactions Page ---- */
  renderTransactions() {
    const f = Store.getState().filters.transactions;
    const result = TxnProc.query({ ...f, pageSize: CONFIG.PAGE_SIZE });

    // Populate category filter
    const catSel = document.getElementById('filter-category');
    if (catSel && catSel.options.length <= 1) {
      const allCats = new Set(Storage.getTransactions().map(t => t.category));
      allCats.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        catSel.appendChild(opt);
      });
    }

    renderTxnList(document.getElementById('txn-list-page'), result.items, {
      onEdit: (id) => App.showEditTxnModal(id),
      onDelete: (id) => App.deleteTxnWithConfirm(id),
      emptyMsg: f.keyword || f.dateFrom || f.category ? '没有匹配的交易记录' : '还没有交易记录',
    });

    // Load more
    const loadMoreEl = document.getElementById('txn-load-more');
    if (result.page < result.totalPages) {
      loadMoreEl.innerHTML = `<button class="btn btn-outline btn-sm" id="btn-load-more">加载更多 (${result.page}/${result.totalPages})</button>`;
    } else if (result.total > CONFIG.PAGE_SIZE) {
      loadMoreEl.innerHTML = `<span style="font-size:12px;color:var(--text-secondary);">共 ${result.total} 条记录</span>`;
    } else {
      loadMoreEl.innerHTML = '';
    }
  },

  /* ---- 6c: Statistics Page ---- */
  renderStats() {
    const state = Store.getState();
    const { statsYear, statsMonth, statsAllTime } = state;

    document.getElementById('stats-month-label').textContent = statsAllTime ? '全部时间' : `${statsYear}年 ${statsMonth}月`;
    const allTimeBtn = document.getElementById('btn-all-time');
    if (allTimeBtn) {
      allTimeBtn.textContent = statsAllTime ? '按月' : '全部';
      allTimeBtn.style.background = statsAllTime ? 'var(--blue)' : '';
      allTimeBtn.style.color = statsAllTime ? '#fff' : '';
    }

    // Determine active view
    const activeViewBtn = document.querySelector('#stats-view-seg button.active');
    const view = activeViewBtn ? activeViewBtn.dataset.view : 'trend';

    // Hide both containers, show appropriate one
    const chartWrap = document.getElementById('stats-chart-wrap');
    const tableWrap = document.getElementById('stats-table-wrap');
    if (view === 'table') { chartWrap.style.display = 'none'; tableWrap.style.display = ''; }
    else { chartWrap.style.display = ''; tableWrap.style.display = 'none'; }

    switch (view) {
      case 'trend': Views._renderTrendChart(); break;
      case 'networth': Views._renderNetWorthChart(); break;
      case 'category': Views._renderCategoryChart(); break;
      case 'table': Views._renderCrossTable(); break;
    }
  },

  _getStatsMonths() {
    const state = Store.getState();
    const { statsYear, statsMonth, statsAllTime } = state;
    if (statsAllTime) {
      const txns = Storage.getTransactions();
      if (txns.length === 0) return [];
      const dates = txns.map(t => t.date.slice(0, 7)).sort();
      const unique = [...new Set(dates)];
      return unique.map(d => { const [y, m] = d.split('-'); return { year: parseInt(y), month: parseInt(m), key: d }; });
    }
    // Single month
    return [{ year: statsYear, month: statsMonth, key: getMonthKey(statsYear, statsMonth) }];
  },

  _getStatsTxns() {
    const state = Store.getState();
    const { statsYear, statsMonth, statsAllTime } = state;
    let txns = Storage.getTransactions();
    if (!statsAllTime) {
      const monthKey = getMonthKey(statsYear, statsMonth);
      txns = txns.filter(t => t.date.startsWith(monthKey));
    }
    return txns;
  },

  /* View 1: Monthly trend line chart */
  _renderTrendChart() {
    const months = Views._getStatsMonths();
    const ctx = document.getElementById('chart-stats-main');
    if (!ctx) return;
    if (ctx._chart) { ctx._chart.destroy(); ctx._chart = null; }
    ctx.style.display = '';

    if (months.length === 0) {
      ctx.style.display = 'none';
      let hint = ctx.parentNode.querySelector('.empty-hint');
      if (!hint) { hint = document.createElement('div'); hint.className = 'empty-hint'; hint.style.cssText = 'text-align:center;padding:40px;color:var(--text-secondary);'; ctx.parentNode.appendChild(hint); }
      hint.textContent = '暂无数据';
      return;
    }
    const hint = ctx.parentNode.querySelector('.empty-hint'); if (hint) hint.remove();

    const incomeData = [], expenseData = [], balanceData = [], labels = [];
    months.forEach(m => {
      const s = TxnProc.getMonthlySummary(m.year, m.month);
      incomeData.push(Math.round(s.income * 100) / 100);
      expenseData.push(Math.round(s.expense * 100) / 100);
      balanceData.push(Math.round(s.balance * 100) / 100);
      labels.push(m.month + '月');
    });

    ctx._chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: '收入', data: incomeData, borderColor: '#34C759', backgroundColor: 'rgba(52,199,89,0.1)', fill: false, tension: 0.3, pointRadius: 4 },
          { label: '支出', data: expenseData, borderColor: '#FF3B30', backgroundColor: 'rgba(255,59,48,0.1)', fill: false, tension: 0.3, pointRadius: 4 },
          { label: '结余', data: balanceData, borderColor: '#007AFF', backgroundColor: 'rgba(0,122,255,0.1)', fill: true, tension: 0.3, pointRadius: 4, borderDash: [4, 2] },
        ],
      },
      options: {
        responsive: true, maintainAspectRatio: true,
        plugins: {
          legend: { position: 'bottom', labels: { usePointStyle: true, font: { size: 12 } } },
          tooltip: { callbacks: { label: (ctx) => ctx.dataset.label + ': ' + formatMoney(ctx.raw) } },
        },
        scales: {
          x: { ticks: { font: { size: 11 } }, grid: { display: false } },
          y: { ticks: { callback: v => v >= 10000 ? (v/10000).toFixed(1) + '万' : v, font: { size: 11 } } },
        },
      },
    });
  },

  /* View 2: Net worth accumulation line chart */
  _renderNetWorthChart() {
    const months = Views._getStatsMonths();
    const accounts = Storage.getAccounts();
    const initialTotal = accounts.reduce((s, a) => s + (parseFloat(a.initialBalance) || parseFloat(a.balance) || 0), 0);
    const ctx = document.getElementById('chart-stats-main');
    if (!ctx) return;
    if (ctx._chart) { ctx._chart.destroy(); ctx._chart = null; }
    ctx.style.display = '';

    if (months.length === 0) {
      ctx.style.display = 'none';
      let hint = ctx.parentNode.querySelector('.empty-hint');
      if (!hint) { hint = document.createElement('div'); hint.className = 'empty-hint'; hint.style.cssText = 'text-align:center;padding:40px;color:var(--text-secondary);'; ctx.parentNode.appendChild(hint); }
      hint.textContent = '暂无数据，请先设置账户并导入交易';
      return;
    }
    const hint = ctx.parentNode.querySelector('.empty-hint'); if (hint) hint.remove();

    const netWorthData = [], labels = [];
    let cumulative = initialTotal;
    months.forEach(m => {
      const s = TxnProc.getMonthlySummary(m.year, m.month);
      cumulative += s.balance;
      netWorthData.push(Math.round(cumulative * 100) / 100);
      labels.push(m.month + '月');
    });

    ctx._chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: '净资产', data: netWorthData, borderColor: '#007AFF', backgroundColor: 'rgba(0,122,255,0.15)', fill: true, tension: 0.3, pointRadius: 5, pointBackgroundColor: '#007AFF' },
        ],
      },
      options: {
        responsive: true, maintainAspectRatio: true,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: (ctx) => '净资产: ' + formatMoney(ctx.raw) } },
        },
        scales: {
          x: { ticks: { font: { size: 11 } }, grid: { display: false } },
          y: { ticks: { callback: v => v >= 10000 ? (v/10000).toFixed(1) + '万' : v, font: { size: 11 } } },
        },
      },
    });
  },

  /* View 3: Category comparison grouped bar chart */
  _renderCategoryChart() {
    const months = Views._getStatsMonths();
    const ctx = document.getElementById('chart-stats-main');
    if (!ctx) return;
    if (ctx._chart) { ctx._chart.destroy(); ctx._chart = null; }
    ctx.style.display = '';

    if (months.length === 0) {
      ctx.style.display = 'none';
      let hint = ctx.parentNode.querySelector('.empty-hint');
      if (!hint) { hint = document.createElement('div'); hint.className = 'empty-hint'; hint.style.cssText = 'text-align:center;padding:40px;color:var(--text-secondary);'; ctx.parentNode.appendChild(hint); }
      hint.textContent = '暂无数据';
      return;
    }
    const hint = ctx.parentNode.querySelector('.empty-hint'); if (hint) hint.remove();

    // Get top 5 expense categories across all selected months
    const allTxns = Views._getStatsTxns().filter(t => t.type === 'expense');
    const catTotals = {};
    allTxns.forEach(t => { catTotals[t.category] = (catTotals[t.category] || 0) + t.amount; });
    const topCats = Object.entries(catTotals).sort((a, b) => b[1] - a[1]).slice(0, 6).map(e => e[0]);

    if (topCats.length === 0) {
      ctx.style.display = 'none';
      let hint = ctx.parentNode.querySelector('.empty-hint');
      if (!hint) { hint = document.createElement('div'); hint.className = 'empty-hint'; hint.style.cssText = 'text-align:center;padding:40px;color:var(--text-secondary);'; ctx.parentNode.appendChild(hint); }
      hint.textContent = '暂无支出数据';
      return;
    }

    const labels = months.map(m => m.month + '月');
    const datasets = topCats.map((cat, catIdx) => {
      const catObj = CategoryMgr.getByName(cat);
      const color = catObj ? catObj.color : CHART_COLORS[catIdx % CHART_COLORS.length];
      const data = months.map(m => {
        const s = TxnProc.getMonthlySummary(m.year, m.month);
        return Math.round((s.byCategory[cat] || 0) * 100) / 100;
      });
      return { label: cat, data, backgroundColor: color, borderRadius: 4, borderSkipped: false };
    });

    ctx._chart = new Chart(ctx, {
      type: 'bar',
      data: { labels, datasets },
      options: {
        responsive: true, maintainAspectRatio: true,
        plugins: {
          legend: { position: 'bottom', labels: { usePointStyle: true, font: { size: 11 }, padding: 12 } },
          tooltip: { callbacks: { label: (ctx) => ctx.dataset.label + ': ' + formatMoney(ctx.raw) } },
        },
        scales: {
          x: { stacked: false, ticks: { font: { size: 11 } }, grid: { display: false } },
          y: { stacked: false, ticks: { callback: v => v >= 10000 ? (v/10000).toFixed(1) + '万' : v, font: { size: 11 } } },
        },
      },
    });
  },

  /* View 4: Cross table (Feishu-style months × categories matrix) */
  _renderCrossTable() {
    const months = Views._getStatsMonths().slice(-12); // last 12 months
    const tableWrap = document.getElementById('stats-table-wrap');
    if (!tableWrap) return;
    const state = Store.getState();

    if (months.length === 0) {
      tableWrap.innerHTML = '<div class="empty-state"><div class="empty-text">暂无数据</div></div>';
      return;
    }

    // Get all expense categories that have data
    const allTxns = Storage.getTransactions().filter(t => t.type === 'expense');
    const catSet = new Set(allTxns.map(t => t.category));
    const cats = EXPENSE_CATEGORIES.filter(c => catSet.has(c.name));
    if (cats.length === 0) {
      tableWrap.innerHTML = '<div class="empty-state"><div class="empty-text">暂无支出数据</div></div>';
      return;
    }

    // Build table
    let html = '<div style="overflow-x:auto;"><table class="cross-table"><thead><tr><th>月份</th>';
    cats.forEach(c => { html += `<th>${c.emoji} ${c.name}</th>`; });
    html += '<th>合计</th></tr></thead><tbody>';

    const colTotals = {};
    cats.forEach(c => { colTotals[c.name] = 0; });

    months.forEach(m => {
      const s = TxnProc.getMonthlySummary(m.year, m.month);
      html += `<tr><td>${m.year}年${m.month}月</td>`;
      let rowTotal = 0;
      cats.forEach(c => {
        const val = Math.round((s.byCategory[c.name] || 0) * 100) / 100;
        rowTotal += val;
        colTotals[c.name] += val;
        html += `<td class="${val === 0 ? 'zero' : ''}">${val > 0 ? formatMoney(val) : '-'}</td>`;
      });
      html += `<td style="font-weight:600;">${rowTotal > 0 ? formatMoney(rowTotal) : '-'}</td></tr>`;
    });

    // Total row
    html += '<tr class="total-row"><td>合计</td>';
    let grandTotal = 0;
    cats.forEach(c => { grandTotal += colTotals[c.name]; html += `<td>${colTotals[c.name] > 0 ? formatMoney(colTotals[c.name]) : '-'}</td>`; });
    html += `<td>${grandTotal > 0 ? formatMoney(grandTotal) : '-'}</td>`;
    html += '</tr></tbody></table></div>';

    tableWrap.innerHTML = html;
  },

  /* ---- 6d: Settings Page ---- */
  renderSettings() {
    Views._renderAccounts();
    Views._renderAssetChart();
    Views._renderDebts();
    Views._renderRecurringBills();
    // Budget button
    const budgets = Storage.getBudgets();
    const currentMonthKey = getMonthKey(new Date().getFullYear(), new Date().getMonth() + 1);
    const currentBudget = budgets.find(b => b.month === currentMonthKey && !b.category);
    const budgetBtn = document.getElementById('btn-set-budget');
    if (budgetBtn) {
      budgetBtn.textContent = currentBudget ? '修改月度预算 (' + formatMoney(currentBudget.amount) + ')' : '设定月度预算';
    }
  },

  _renderDebts() {
    const debts = Storage.getDebts();
    const el = document.getElementById('debt-list');
    if (debts.length === 0) {
      el.innerHTML = '<div class="empty-state" style="padding:16px;"><div class="empty-text" style="font-size:13px;">还没有债务记录</div></div>';
      return;
    }
    el.innerHTML = debts.map(d => `
      <div class="bill-card" data-debt-id="${d.id}">
        <span class="bill-icon">💳</span>
        <div class="bill-info">
          <div class="bill-name">${escapeHTML(d.name)} <span class="tag ${d.isActive ? 'tag-active' : 'tag-inactive'}">${d.isActive ? '还款中' : '已还清'}</span></div>
          <div class="bill-meta">总额 ${formatMoney(d.totalAmount || 0)} · 每月${d.dueDay}号还款 · 月供 ${formatMoney(d.monthlyPayment || 0)}</div>
        </div>
        <div class="bill-amount" style="color:var(--red);margin-right:8px;">${formatMoney(d.remainingAmount || d.totalAmount || 0)}</div>
        <button class="btn btn-outline btn-sm" data-action="edit-debt" style="font-size:11px;">编辑</button>
      </div>`).join('');

    el.querySelectorAll('[data-action="edit-debt"]').forEach(btn => {
      btn.addEventListener('click', () => App.showDebtModal(btn.closest('.bill-card').dataset.debtId));
    });
  },

  _renderAccounts() {
    const accounts = Storage.getAccounts();
    const el = document.getElementById('account-list');
    if (accounts.length === 0) {
      el.innerHTML = '<div class="empty-state" style="padding:20px;"><div class="empty-text" style="font-size:13px;">还没有资产账户</div></div>';
      return;
    }
    el.innerHTML = accounts.map(a => {
      const typeInfo = ACCOUNT_TYPES.find(t => t.value === a.type) || ACCOUNT_TYPES[6];
      return `<div class="account-card" data-acc-id="${a.id}">
        <span class="acc-icon">${a.icon || typeInfo.emoji}</span>
        <div class="acc-info"><div class="acc-name">${escapeHTML(a.name)}</div><div class="acc-type">${typeInfo.label}</div></div>
        <div class="acc-balance">${formatMoney(a.balance || 0)}</div>
        <button class="btn btn-outline btn-sm" data-action="edit-account" style="margin-left:8px;font-size:11px;">编辑</button>
        <button class="btn btn-sm" data-action="delete-account" style="margin-left:4px;font-size:11px;color:var(--red);">✕</button>
      </div>`;
    }).join('');

    // Event delegation
    el.querySelectorAll('[data-action="edit-account"]').forEach(btn => {
      btn.addEventListener('click', () => App.showAccountModal(btn.closest('.account-card').dataset.accId));
    });
    el.querySelectorAll('[data-action="delete-account"]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.closest('.account-card').dataset.accId;
        const confirmed = await showConfirm('删除账户', '确定要删除这个资产账户吗？', '删除', '取消');
        if (confirmed) { Storage.deleteAccount(id); Views.renderSettings(); Views.renderHome(); }
      });
    });
  },

  _renderAssetChart() {
    const accounts = Storage.getAccounts().filter(a => (a.balance || 0) > 0);
    const ctx = document.getElementById('chart-assets');
    if (!ctx) return;
    if (ctx._chart) { ctx._chart.destroy(); ctx._chart = null; }

    if (accounts.length === 0) {
      ctx.style.display = 'none';
      return;
    }
    ctx.style.display = '';

    ctx._chart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: accounts.map(a => a.name),
        datasets: [{ data: accounts.map(a => a.balance || 0), backgroundColor: accounts.map(a => a.color || '#007AFF'), borderWidth: 2, borderColor: getComputedStyle(document.documentElement).getPropertyValue('--bg-secondary').trim() }],
      },
      options: {
        responsive: true, maintainAspectRatio: true, cutout: '60%',
        plugins: {
          legend: { position: 'bottom', labels: { padding: 12, usePointStyle: true, font: { size: 11 } } },
          tooltip: { callbacks: { label: (ctx) => ctx.label + ': ' + formatMoney(ctx.raw) } },
        },
      },
    });
  },

  _renderRecurringBills() {
    const bills = Storage.getRecurringBills();
    const el = document.getElementById('recurring-bills-list');
    if (bills.length === 0) {
      el.innerHTML = '<div class="empty-state" style="padding:20px;"><div class="empty-text" style="font-size:13px;">还没有周期账单</div></div>';
      return;
    }
    const today = new Date().toISOString().slice(0, 10);
    el.innerHTML = bills.sort((a, b) => a.nextDueDate.localeCompare(b.nextDueDate)).map(b => {
      const overdue = b.nextDueDate < today;
      const freqLabel = (FREQUENCIES.find(f => f.value === b.frequency) || {}).label || b.frequency;
      return `<div class="bill-card${overdue ? ' overdue' : ''}" data-bill-id="${b.id}">
        <span class="bill-icon">${b.type === 'expense' ? '📤' : '📥'}</span>
        <div class="bill-info">
          <div class="bill-name">${escapeHTML(b.name)} <span class="tag ${b.isActive ? 'tag-active' : 'tag-inactive'}">${b.isActive ? '进行中' : '已暂停'}</span></div>
          <div class="bill-meta">${freqLabel} · 下次: ${b.nextDueDate} ${overdue ? '⚠️ 已逾期' : ''}</div>
        </div>
        <div class="bill-amount" style="color:${b.type === 'expense' ? 'var(--red)' : 'var(--green)'};margin-right:8px;">${formatMoney(b.amount)}</div>
        <button class="btn btn-outline btn-sm" data-action="edit-bill" style="font-size:11px;">编辑</button>
        <button class="btn btn-sm" data-action="delete-bill" style="font-size:11px;color:var(--red);margin-left:4px;">✕</button>
      </div>`;
    }).join('');

    el.querySelectorAll('[data-action="edit-bill"]').forEach(btn => {
      btn.addEventListener('click', () => App.showBillModal(btn.closest('.bill-card').dataset.billId));
    });
    el.querySelectorAll('[data-action="delete-bill"]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.closest('.bill-card').dataset.billId;
        const confirmed = await showConfirm('删除周期账单', '确定要删除这个周期账单吗？', '删除', '取消');
        if (confirmed) {
          Storage.setRecurringBills(Storage.getRecurringBills().filter(b => b.id !== id));
          Views.renderSettings();
        }
      });
    });
  },
};

// ================================================================
//  SECTION 7: App Shell
// ================================================================

const App = {
  // ---- Page Navigation ----
  navigateTo(page) {
    Store.getState().currentPage = page;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const target = document.getElementById('page-' + page);
    if (target) target.classList.add('active');

    // TabBar
    document.querySelectorAll('#tabbar .tab-item[data-page]').forEach(t => {
      t.classList.toggle('active', t.dataset.page === page);
    });

    // Render
    switch (page) {
      case 'home': Views.renderHome(); break;
      case 'txns': Views.renderTransactions(); break;
      case 'stats': Views.renderStats(); break;
      case 'settings': Views.renderSettings(); break;
    }

    document.getElementById('pages').scrollTop = 0;
  },

  // ---- Bookkeeping Modal ----
  showBookkeepingModal(editId) {
    Store.getState().editingTxnId = editId || null;
    const txn = editId ? Storage.getTransactions().find(t => t.id === editId) : null;
    const isEdit = !!txn;

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'modal-bookkeeping-overlay';

    let html = `<div class="modal-sheet" id="modal-bookkeeping-sheet">
      <div class="modal-header">
        <button class="modal-cancel" id="bk-cancel">取消</button>
        <span class="modal-title">${isEdit ? '编辑交易' : '记一笔'}</span>
        <button class="modal-save" id="bk-save">${isEdit ? '更新' : '保存'}</button>
      </div>`;

    // Type segmented
    html += `<div class="segmented" id="bk-type-seg">
      <button class="${(!txn || txn.type === 'expense') ? 'active' : ''}" data-type="expense">支出</button>
      <button class="${(txn && txn.type === 'income') ? 'active' : ''}" data-type="income">收入</button>
    </div>`;

    // Amount display + Numpad container
    html += `<div id="bk-numpad-container"></div>`;

    // Category grid
    const currentType = txn ? txn.type : 'expense';
    const cats = currentType === 'expense' ? EXPENSE_CATEGORIES : INCOME_CATEGORIES;
    const selectedCat = txn ? txn.category : (cats[0] ? cats[0].name : '其他');
    html += `<div class="category-grid" id="bk-cat-grid">
      ${cats.map(c => `<div class="cat-btn${c.name === selectedCat ? ' selected' : ''}" data-cat="${c.name}"><span class="cat-emoji">${c.emoji}</span>${c.name}</div>`).join('')}
    </div>`;

    // Extras: date, note, account
    html += `<div class="input-row"><label>日期</label><input type="date" id="bk-date" value="${txn ? txn.date : new Date().toISOString().slice(0, 10)}"></div>`;
    html += `<div class="input-row"><label>备注</label><input type="text" id="bk-note" placeholder="添加备注..." value="${escapeHTML(txn ? (txn.note || '') : '')}"></div>`;
    const accounts = Storage.getAccounts();
    html += `<div class="input-row"><label>关联账户</label><select id="bk-account"><option value="">不关联</option>${accounts.map(a => `<option value="${a.id}"${txn && txn.accountId === a.id ? ' selected' : ''}>${escapeHTML(a.name)}</option>`).join('')}</select></div>`;

  // ---- CSV Import ----
  triggerCSVImport(type) {
    const input = document.getElementById(type === 'alipay' ? 'file-alipay' : 'file-wechat');
    if (input) input.click();
  },

  async handleCSVImport(event, sourceLabel) {
    const file = event.target.files[0];
    if (!file) return;

    try {
      const buffer = await file.arrayBuffer();
      const result = CSVImport.parse(buffer);
      const { parsed, skipped } = result;

      if (parsed.length === 0) throw new Error('未解析到有效交易记录');

      // Show preview modal
      this._showCSVPreview(parsed, skipped, sourceLabel);
    } catch(err) {
      showToast('导入失败：' + err.message, 'error');
      console.error(err);
    }
    event.target.value = '';
  },

  _showCSVPreview(parsed, skipped, sourceLabel) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'csv-preview-overlay';

    const summary = `${parsed.length} 条待导入` +
      (skipped.invalidDir > 0 ? `，${skipped.invalidDir} 条非交易记录已跳过` : '') +
      (skipped.invalidStatus > 0 ? `，${skipped.invalidStatus} 条未成功交易已跳过` : '');

    // Check duplicates
    let dupCount = 0;
    parsed.forEach(p => {
      if (p.sourceRef && Storage.isDuplicate(p.sourceRef)) dupCount++;
    });

    let html = `<div class="modal-sheet" style="max-height:95vh;">
      <div class="modal-header">
        <button class="modal-cancel" id="csv-cancel">取消</button>
        <span class="modal-title">导入${sourceLabel}账单</span>
        <button class="modal-save" id="csv-confirm">确认导入</button>
      </div>
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px;">${summary}</div>
      ${dupCount > 0 ? `<div style="font-size:12px;color:var(--orange);margin-bottom:8px;">⚠️ 检测到 ${dupCount} 条可能重复的交易（最近${CONFIG.CSV_DEDUP_DAYS}天内），将自动跳过</div>` : ''}
      <div style="margin-bottom:8px;font-size:13px;">预览前 ${Math.min(parsed.length, 20)} 条（可修改分类）：</div>
      <div style="max-height:50vh;overflow-y:auto;">
        <table class="csv-preview-table"><thead><tr><th>日期</th><th>分类</th><th>金额</th><th>说明</th></tr></thead><tbody>`;

    parsed.slice(0, 20).forEach((p, i) => {
      const cats = p.type === 'expense' ? EXPENSE_CATEGORIES : INCOME_CATEGORIES;
      html += `<tr>
        <td>${p.date}</td>
        <td><select data-index="${i}" data-field="category">${cats.map(c => `<option value="${c.name}"${c.name === p.category ? ' selected' : ''}>${c.emoji} ${c.name}</option>`).join('')}</select></td>
        <td style="color:${p.type === 'expense' ? 'var(--red)' : 'var(--green)'};">${formatMoney(p.amount)}</td>
        <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHTML(p.note)}</td>
      </tr>`;
    });

    html += `</tbody></table></div>
      ${parsed.length > 20 ? `<div style="font-size:12px;color:var(--text-tertiary);text-align:center;">... 还有 ${parsed.length - 20} 条</div>` : ''}
    </div>`;

    overlay.innerHTML = html;
    document.body.appendChild(overlay);
    document.body.classList.add('modal-open');

    // Category change handlers
    overlay.querySelectorAll('select[data-index]').forEach(sel => {
      sel.addEventListener('change', () => {
        const idx = parseInt(sel.dataset.index);
        parsed[idx].category = sel.value;
      });
    });

    // Cancel
    overlay.querySelector('#csv-cancel').addEventListener('click', () => {
      overlay.remove();
      document.body.classList.remove('modal-open');
    });

    // Confirm
    overlay.querySelector('#csv-confirm').addEventListener('click', () => {
      const result = CSVImport.importParsed(parsed);
      overlay.remove();
      document.body.classList.remove('modal-open');
      showToast(`成功导入 ${result.imported} 条交易${result.duplicates > 0 ? '，跳过 ' + result.duplicates + ' 条重复' : ''} ✓`, 'success');
      Views.renderHome();
      Views.renderTransactions();
      Views.renderSettings();
    });

    // Overlay click
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) { overlay.remove(); document.body.classList.remove('modal-open'); }
    });
  },

  // ---- JSON Export/Import ----
  exportJSON() {
    const data = Storage.exportAll();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '记账备份_' + new Date().toISOString().slice(0, 10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('数据已导出 ✓', 'success');
  },

  importJSON(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const data = JSON.parse(e.target.result);
        const currentTxns = Storage.getTransactions();
        if (currentTxns.length > 0) {
          const confirmed = await showConfirm('导入数据', `即将导入 ${data.transactions ? data.transactions.length : 0} 条交易，将替换当前全部数据。确定继续？`, '确认导入', '取消');
          if (!confirmed) return;
        }
        Storage.importAll(data);
        showToast('数据已恢复 ✓', 'success');
        Views.renderHome();
        Views.renderTransactions();
        Views.renderStats();
        Views.renderSettings();
      } catch(err) {
        showToast('导入失败：文件格式不正确', 'error');
        console.error(err);
      }
    };
    reader.readAsText(file);
    event.target.value = '';
  },

  exportCSV() {
    const txns = Storage.getTransactions();
    const header = '﻿日期,类型,分类,金额,备注,账户,来源\n';
    const rows = txns.map(t => [
      t.date, t.type === 'expense' ? '支出' : '收入', t.category, t.amount.toFixed(2),
      '"' + (t.note || '').replace(/"/g, '""') + '"',
      t.accountId || '', t.source
    ].join(',')).join('\n');
    const blob = new Blob([header + rows], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = '交易导出_' + new Date().toISOString().slice(0, 10) + '.csv';
    a.click(); URL.revokeObjectURL(url);
    showToast('CSV已导出 ✓', 'success');
  },

        <input type="number" id="pay-salary" placeholder="0" step="100" value="${profile.salary || ''}"></div>
    </div>`;
    document.body.appendChild(overlay);
    document.body.classList.add('modal-open');
    overlay.querySelector('#pay-cancel').addEventListener('click', () => { overlay.remove(); document.body.classList.remove('modal-open'); });
    overlay.querySelector('#pay-save').addEventListener('click', () => {
      const payday = parseInt(overlay.querySelector('#pay-day').value);
      const salary = parseFloat(overlay.querySelector('#pay-salary').value) || null;
      Storage.setUserProfile({ ...profile, payday, salary });
      overlay.remove(); document.body.classList.remove('modal-open');
      showToast('发薪日已更新 ✓', 'success');
      Views.renderHome();
    });
    overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.remove(); document.body.classList.remove('modal-open'); } });
  },

  // ---- Debt Modal ----
  showDebtModal(editId) {
    const debt = editId ? Storage.getDebts().find(d => d.id === editId) : null;
    const isEdit = !!debt;
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `<div class="modal-sheet">
      <div class="modal-header">
        <button class="modal-cancel" id="debt-cancel">取消</button>
        <span class="modal-title">${isEdit ? '编辑债务' : '添加债务'}</span>
        <button class="modal-save" id="debt-save">${isEdit ? '更新' : '添加'}</button>
      </div>
      <div class="input-row"><label>名称</label><input type="text" id="debt-name" placeholder="如：招商信用卡" value="${escapeHTML(debt ? debt.name : '')}"></div>
      <div class="input-row"><label>总金额</label><input type="number" id="debt-total" placeholder="0.00" step="0.01" value="${debt ? (debt.totalAmount || '') : ''}"></div>
      <div class="input-row"><label>剩余金额</label><input type="number" id="debt-remaining" placeholder="0.00" step="0.01" value="${debt ? (debt.remainingAmount || debt.totalAmount || '') : ''}"></div>
      <div class="input-row"><label>每月还款日</label><select id="debt-due">${Array.from({length:31},(_,i)=>i+1).map(d => `<option value="${d}"${debt && debt.dueDay === d ? ' selected' : ''}>${d} 号</option>`).join('')}</select></div>
      <div class="input-row"><label>月还款额</label><input type="number" id="debt-monthly" placeholder="0.00" step="0.01" value="${debt ? (debt.monthlyPayment || '') : ''}"></div>
      <div class="input-row"><label>提前提醒天数</label><select id="debt-remind">${[1,3,5,7].map(d => `<option value="${d}"${debt && debt.remindBefore === d ? ' selected' : ''}>提前 ${d} 天</option>`).join('')}</select></div>
      ${isEdit ? `<div style="text-align:center;margin-top:8px;"><button class="btn btn-outline btn-sm" id="debt-delete" style="color:var(--red);">删除此债务</button></div>` : ''}
    </div>`;
    document.body.appendChild(overlay);
    document.body.classList.add('modal-open');
    overlay.querySelector('#debt-cancel').addEventListener('click', () => { overlay.remove(); document.body.classList.remove('modal-open'); });
    overlay.querySelector('#debt-save').addEventListener('click', () => {
      const name = overlay.querySelector('#debt-name').value.trim();
      if (!name) { showToast('请输入债务名称', 'warn'); return; }
      const data = {
        id: isEdit ? debt.id : genId('debt'),
        name,
        totalAmount: Math.round((parseFloat(overlay.querySelector('#debt-total').value) || 0) * 100) / 100,
        remainingAmount: Math.round((parseFloat(overlay.querySelector('#debt-remaining').value) || 0) * 100) / 100,
        monthlyPayment: Math.round((parseFloat(overlay.querySelector('#debt-monthly').value) || 0) * 100) / 100,
        dueDay: parseInt(overlay.querySelector('#debt-due').value),
        remindBefore: parseInt(overlay.querySelector('#debt-remind').value),
        isActive: debt ? debt.isActive : true,
        createdAt: isEdit ? debt.createdAt : new Date().toISOString(),
      };
      const debts = Storage.getDebts();
      if (isEdit) {
        const idx = debts.findIndex(d => d.id === debt.id);
        if (idx !== -1) debts[idx] = data;
      } else {
        debts.push(data);
      }
      Storage.setDebts(debts);
      overlay.remove(); document.body.classList.remove('modal-open');
      showToast(isEdit ? '债务已更新 ✓' : '债务已添加 ✓', 'success');
      Views.renderSettings(); Views.renderHome();
    });
    const delBtn = overlay.querySelector('#debt-delete');
    if (delBtn) {
      delBtn.addEventListener('click', async () => {
        const confirmed = await showConfirm('删除债务', '确定要删除此债务记录吗？', '删除', '取消');
        if (confirmed) {
          Storage.setDebts(Storage.getDebts().filter(d => d.id !== debt.id));
          overlay.remove(); document.body.classList.remove('modal-open');
          showToast('债务已删除', 'success');
          Views.renderSettings(); Views.renderHome();
        }
      });
    }
    overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.remove(); document.body.classList.remove('modal-open'); } });
  },

  // ---- Onboarding Wizard ----
  showOnboarding() {
    let step = 0;
    const profile = Storage.getUserProfile();

    // Temp state for wizard
    const wizardAccounts = Storage.getAccounts().length > 0 ? [...Storage.getAccounts()] : [
      { name: '', type: 'checking', initialBalance: 0 },
      { name: '', type: 'e_wallet', initialBalance: 0 },
    ];
    let wizardPayday = profile.payday || 15;
    let wizardSalary = profile.salary || null;
    const wizardDebts = Storage.getDebts().length > 0 ? [...Storage.getDebts()] : [];

    const overlay = document.createElement('div');
    overlay.className = 'onboard-overlay';
    overlay.id = 'onboard-overlay';
    document.body.appendChild(overlay);

    const render = () => {
      const steps = [
        { title: '设置资产账户', subtitle: '输入你当前的账户余额（包含3月之前的所有积蓄）', emoji: '💰' },
        { title: '发薪日设置', subtitle: '设置每月的发薪日期', emoji: '📅' },
        { title: '债务信息', subtitle: '信用卡、贷款等（可跳过，之后可补充）', emoji: '📋' },
      ];
      const s = steps[step];

      let bodyHTML = '';

      if (step === 0) {
        // Step 1: Asset accounts
        bodyHTML = wizardAccounts.map((a, i) => `
          <div class="onboard-account-row">
            <input type="text" placeholder="账户名称" value="${escapeHTML(a.name)}" data-acc-name="${i}" style="flex:2;">
            <select data-acc-type="${i}">${ACCOUNT_TYPES.map(t => `<option value="${t.value}"${a.type === t.value ? ' selected' : ''}>${t.emoji}</option>`).join('')}</select>
            <input type="number" placeholder="余额" value="${a.initialBalance || ''}" data-acc-bal="${i}" step="0.01" style="flex:1;">
            ${wizardAccounts.length > 1 ? `<button class="btn btn-sm" data-acc-del="${i}" style="color:var(--red);font-size:18px;padding:4px;">✕</button>` : ''}
          </div>`).join('') +
          `<button class="btn btn-outline btn-sm btn-block" id="onboard-add-acc" style="margin-top:8px;">+ 添加账户</button>`;
      } else if (step === 1) {
        // Step 2: Payday + salary
        bodyHTML = `
          <div class="emoji-hint">📅</div>
          <div class="input-row"><label>每月发薪日</label>
            <select id="wiz-payday">${Array.from({length:31},(_,i)=>i+1).map(d => `<option value="${d}"${wizardPayday === d ? ' selected' : ''}>每月 ${d} 号</option>`).join('')}</select></div>
          <div class="input-row"><label>大致月薪（可选，用于预算建议）</label>
            <input type="number" id="wiz-salary" placeholder="0" step="100" value="${wizardSalary || ''}"></div>`;
      } else {
        // Step 3: Debts (optional)
        bodyHTML = wizardDebts.map((d, i) => `
          <div class="onboard-debt-row">
            <input type="text" placeholder="名称(如招商信用卡)" value="${escapeHTML(d.name)}" data-debt-name="${i}" style="flex:2;min-width:100px;">
            <input type="number" placeholder="总额" value="${d.totalAmount || ''}" data-debt-total="${i}" step="0.01" style="width:80px;">
            <span style="font-size:12px;color:var(--text-secondary);">还款日</span>
            <select data-debt-due="${i}">${Array.from({length:31},(_,j)=>j+1).map(dd => `<option value="${dd}"${d.dueDay === dd ? ' selected' : ''}>${dd}号</option>`).join('')}</select>
            <input type="number" placeholder="月还款" value="${d.monthlyPayment || ''}" data-debt-mp="${i}" step="0.01" style="width:80px;">
            <button class="btn btn-sm" data-debt-del="${i}" style="color:var(--red);">✕</button>
          </div>`).join('') +
          `<button class="btn btn-outline btn-sm btn-block" id="onboard-add-debt" style="margin-top:8px;">+ 添加债务</button>`;
      }

      overlay.innerHTML = `
        <div class="onboard-header">
          <h2>${s.title}</h2>
          <p>${s.subtitle}</p>
          <div class="onboard-steps-dots">${steps.map((_, i) => `<span class="${i === step ? 'active' : ''}"></span>`).join('')}</div>
        </div>
        <div class="onboard-body">${bodyHTML}</div>
        <div class="onboard-footer">
          ${step > 0 ? `<button class="btn-secondary" id="onboard-prev">上一步</button>` : ''}
          ${step < 2 ? `<button class="btn-primary" id="onboard-next">下一步</button>` : `<button class="btn-primary" id="onboard-done">完成设置 🎉</button>`}
          ${step === 2 ? `<button class="btn-secondary" id="onboard-skip-debt">跳过</button>` : ''}
        </div>`;

      // Bind step 0 events
      if (step === 0) {
        overlay.querySelector('#onboard-add-acc')?.addEventListener('click', () => {
          wizardAccounts.push({ name: '', type: 'checking', initialBalance: 0 });
          render();
        });
        overlay.querySelectorAll('[data-acc-del]').forEach(btn => {
          btn.addEventListener('click', () => {
            wizardAccounts.splice(parseInt(btn.dataset.accDel), 1);
            render();
          });
        });
        overlay.querySelector('#onboard-next')?.addEventListener('click', () => {
          // Collect account data
          overlay.querySelectorAll('[data-acc-name]').forEach(inp => {
            const i = parseInt(inp.dataset.accName);
            wizardAccounts[i].name = inp.value.trim();
          });
          overlay.querySelectorAll('[data-acc-type]').forEach(sel => {
            const i = parseInt(sel.dataset.accType);
            wizardAccounts[i].type = sel.value;
          });
          overlay.querySelectorAll('[data-acc-bal]').forEach(inp => {
            const i = parseInt(inp.dataset.accBal);
            wizardAccounts[i].initialBalance = parseFloat(inp.value) || 0;
          });
          // Validate
          const valid = wizardAccounts.filter(a => a.name.trim());
          if (valid.length === 0) { showToast('请至少填写一个账户', 'warn'); return; }
          step++; render();
        });
      }

      // Step 1 events
      if (step === 1) {
        overlay.querySelector('#onboard-prev')?.addEventListener('click', () => { step--; render(); });
        overlay.querySelector('#onboard-next')?.addEventListener('click', () => {
          wizardPayday = parseInt(overlay.querySelector('#wiz-payday')?.value || '15');
          wizardSalary = parseFloat(overlay.querySelector('#wiz-salary')?.value) || null;
          step++; render();
        });
      }

      // Step 2 events
      if (step === 2) {
        overlay.querySelector('#onboard-prev')?.addEventListener('click', () => { step--; render(); });
        overlay.querySelector('#onboard-add-debt')?.addEventListener('click', () => {
          wizardDebts.push({ name: '', totalAmount: 0, remainingAmount: 0, monthlyPayment: 0, dueDay: wizardPayday, remindBefore: 3, isActive: true });
          render();
        });
        overlay.querySelectorAll('[data-debt-del]').forEach(btn => {
          btn.addEventListener('click', () => {
            wizardDebts.splice(parseInt(btn.dataset.debtDel), 1);
            render();
          });
        });

        const finish = () => {
          // Collect debt data
          if (step === 2) {
            overlay.querySelectorAll('[data-debt-name]').forEach(inp => {
              const i = parseInt(inp.dataset.debtName);
              if (wizardDebts[i]) wizardDebts[i].name = inp.value.trim();
            });
            overlay.querySelectorAll('[data-debt-total]').forEach(inp => {
              const i = parseInt(inp.dataset.debtTotal);
              if (wizardDebts[i]) wizardDebts[i].totalAmount = parseFloat(inp.value) || 0;
            });
            overlay.querySelectorAll('[data-debt-due]').forEach(sel => {
              const i = parseInt(sel.dataset.debtDue);
              if (wizardDebts[i]) wizardDebts[i].dueDay = parseInt(sel.value);
            });
            overlay.querySelectorAll('[data-debt-mp]').forEach(inp => {
              const i = parseInt(inp.dataset.debtMp);
              if (wizardDebts[i]) wizardDebts[i].monthlyPayment = parseFloat(inp.value) || 0;
            });
          }

          // Save all — clear existing accounts first to avoid duplicates
          const validAccounts = wizardAccounts.filter(a => a.name.trim());
          const typeInfo = (t) => ACCOUNT_TYPES.find(at => at.value === t) || ACCOUNT_TYPES[5];
          Storage.setAccounts([]); // clear existing
          validAccounts.forEach(a => {
            Storage.addAccount({
              id: genId('acc'),
              name: a.name.trim(),
              type: a.type,
              balance: a.initialBalance,
              initialBalance: a.initialBalance,
              currency: 'CNY',
              icon: typeInfo(a.type).emoji,
              color: '#007AFF',
              sortOrder: Storage.getAccounts().length,
              createdAt: new Date().toISOString(),
            });
          });
          Storage.setUserProfile({ payday: wizardPayday, salary: wizardSalary, onboardingCompleted: true });
          const validDebts = wizardDebts.filter(d => d.name.trim());
          Storage.setDebts(validDebts.map(d => ({
            id: genId('debt'),
            name: d.name.trim(),
            totalAmount: d.totalAmount,
            remainingAmount: d.remainingAmount || d.totalAmount,
            monthlyPayment: d.monthlyPayment,
            dueDay: d.dueDay,
            remindBefore: 3,
            isActive: true,
            createdAt: new Date().toISOString(),
          })));

          overlay.remove();
          document.body.classList.remove('modal-open');
          showToast('设置完成！欢迎使用记账本 🎉', 'success');
          this._initApp();
        };

        overlay.querySelector('#onboard-done')?.addEventListener('click', finish);
        overlay.querySelector('#onboard-skip-debt')?.addEventListener('click', finish);
      }
    };

    render();
  },

  // ---- Init ----
  init() {
    // Check onboarding
    const profile = Storage.getUserProfile();
    if (!profile.onboardingCompleted) {
      this.showOnboarding();
      return; // rest of init runs after onboarding completes
    }

    this._initApp();
  },

  _initApp() {
    // Process recurring bills on load
    const today = new Date().toISOString().slice(0, 10);
    const processed = BillProcessor.processBills(today);
    if (processed > 0) console.log('[init] Processed ' + processed + ' recurring bills');

    // Bind TabBar
    document.querySelectorAll('#tabbar .tab-item[data-page]').forEach(tab => {
      tab.addEventListener('click', () => {
        this.navigateTo(tab.dataset.page);
      });
    });

    // Center FAB
    document.getElementById('btn-add-txn').addEventListener('click', () => {
      this.showBookkeepingModal();
    });

    // Settings buttons
    document.getElementById('btn-add-account')?.addEventListener('click', () => this.showAccountModal());
    document.getElementById('btn-set-budget')?.addEventListener('click', () => this.showBudgetModal());
    document.getElementById('btn-add-bill')?.addEventListener('click', () => this.showBillModal());
    document.getElementById('btn-edit-payday')?.addEventListener('click', () => this.showPaydayModal());
    document.getElementById('btn-add-debt')?.addEventListener('click', () => this.showDebtModal());
    document.getElementById('btn-import-alipay')?.addEventListener('click', () => this.triggerCSVImport('alipay'));
    document.getElementById('btn-import-wechat')?.addEventListener('click', () => this.triggerCSVImport('wechat'));
    document.getElementById('btn-export-json')?.addEventListener('click', () => this.exportJSON());
    document.getElementById('btn-import-json')?.addEventListener('click', () => document.getElementById('file-import-json').click());
    document.getElementById('btn-export-csv')?.addEventListener('click', () => this.exportCSV());
    document.getElementById('file-alipay')?.addEventListener('change', (e) => this.handleCSVImport(e, '支付宝'));
    document.getElementById('file-wechat')?.addEventListener('change', (e) => this.handleCSVImport(e, '微信'));
    document.getElementById('file-import-json')?.addEventListener('change', (e) => this.importJSON(e));

    // Stats navigation
    document.getElementById('btn-prev-month')?.addEventListener('click', () => {
      const s = Store.getState();
      s.statsAllTime = false;
      if (s.statsMonth === 1) { s.statsMonth = 12; s.statsYear--; }
      else s.statsMonth--;
      Views.renderStats();
    });
    document.getElementById('btn-next-month')?.addEventListener('click', () => {
      const s = Store.getState();
      s.statsAllTime = false;
      const now = new Date();
      if (s.statsYear === now.getFullYear() && s.statsMonth >= now.getMonth() + 1) return;
      if (s.statsMonth === 12) { s.statsMonth = 1; s.statsYear++; }
      else s.statsMonth++;
      Views.renderStats();
    });
    document.getElementById('btn-all-time')?.addEventListener('click', () => {
      const s = Store.getState();
      s.statsAllTime = !s.statsAllTime;
      Views.renderStats();
    });

    // Stats type segmented
    // Stats view type selector
    document.getElementById('stats-view-seg')?.addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn || btn.classList.contains('active')) return;
      document.querySelectorAll('#stats-view-seg button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      Views.renderStats();
    });

    // Transaction page filters
    const filterHandler = debounce(() => {
      const f = Store.getState().filters.transactions;
      f.dateFrom = document.getElementById('filter-date-from')?.value || '';
      f.dateTo = document.getElementById('filter-date-to')?.value || '';
      f.type = document.getElementById('filter-type')?.value || '';
      f.category = document.getElementById('filter-category')?.value || '';
      f.keyword = document.getElementById('filter-keyword')?.value || '';
      f.page = 1;
      Views.renderTransactions();
    }, 300);

    ['filter-date-from', 'filter-date-to', 'filter-type', 'filter-category', 'filter-keyword'].forEach(id => {
      document.getElementById(id)?.addEventListener('input', filterHandler);
      document.getElementById(id)?.addEventListener('change', filterHandler);
    });

    // Load more transactions
    document.getElementById('txn-load-more')?.addEventListener('click', (e) => {
      const btn = e.target.closest('#btn-load-more');
      if (btn) {
        Store.getState().filters.transactions.page++;
        Views.renderTransactions();
        document.getElementById('pages').scrollTop = document.getElementById('pages').scrollHeight;
      }
    });

    // Home budget empty click (delegated)
    document.getElementById('home-budget')?.addEventListener('click', (e) => {
      if (e.target.closest('#home-budget-empty')) {
        this.navigateTo('settings');
        setTimeout(() => this.showBudgetModal(), 300);
      }
    });

    // Store subscriptions for cross-page refresh
    Store.on('txn_added', () => {
      const page = Store.getState().currentPage;
      if (page === 'home') Views.renderHome();
    });
    Store.on('accounts_changed', () => {
      if (Store.getState().currentPage === 'settings') Views.renderSettings();
    });

    // Dark mode listener
    if (window.matchMedia) {
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        // Destroy all chart instances so they re-render with correct colors
        ['chart-stats-main', 'chart-assets'].forEach(id => {
          const canvas = document.getElementById(id);
          if (canvas && canvas._chart) { canvas._chart.destroy(); canvas._chart = null; }
        });
        const page = Store.getState().currentPage;
        if (page === 'stats') setTimeout(() => Views.renderStats(), 100);
        if (page === 'settings') setTimeout(() => Views._renderAssetChart(), 100);
      });
    }

    // Initial render
    this.navigateTo('home');
    console.log('[init] App ready');
  },
};

// ---- Bootstrap ----
document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
